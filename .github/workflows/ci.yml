name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore iucs.readernest.api.sln

      - name: Build
        run: dotnet build iucs.readernest.api.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test iucs.readernest.tests/iucs.readernest.tests.csproj --no-build --configuration Release --logger "trx"
